name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Use preinstalled Android SDK
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"

          echo "ANDROID_HOME=$ANDROID_HOME"
          command -v sdkmanager
          sdkmanager --version

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"

          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install Android packages
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"

          packages=(
            "platform-tools"
            "platforms;android-35"
            "build-tools;35.0.0"
          )

          installed=0
          for attempt in 1 2 3 4; do
            echo "Tentativa $attempt/4 para instalar pacotes Android..."
            if sdkmanager "${packages[@]}"; then
              installed=1
              break
            fi
            sleep 10
          done

          if [ "$installed" != "1" ]; then
            echo "Falha ao instalar pacotes Android após 4 tentativas."
            exit 1
          fi

          test -d "$ANDROID_HOME/platforms/android-35"
          test -d "$ANDROID_HOME/build-tools/35.0.0"

      - name: Prepare Coffee GB core
        run: |
          sudo apt-get update
          sudo apt-get install -y maven unzip
          rm -rf /tmp/coffee-gb
          git clone --depth 1 https://github.com/trekawek/coffee-gb.git /tmp/coffee-gb

          python3 - <<'PY_COFFEE_ANDROID_COMPAT'
          from pathlib import Path

          def ensure_import(source, existing_import, extra_imports):
              if extra_imports in source:
                  return source
              if existing_import not in source:
                  raise SystemExit(f"Import marker not found: {existing_import}")
              return source.replace(existing_import, extra_imports + "\n" + existing_import)

          def patch_bios():
              path = Path("/tmp/coffee-gb/core/src/main/java/eu/rekawek/coffeegb/core/memory/Bios.java")
              source = path.read_text()

              if "readFullyCompat(InputStream input)" not in source:
                  source = ensure_import(
                      source,
                      "import java.io.IOException;",
                      "import java.io.ByteArrayOutputStream;\nimport java.io.InputStream;"
                  )

                  old = "var rom = is.readAllBytes();"
                  new = "var rom = readFullyCompat(is);"
                  if old not in source:
                      raise SystemExit("Bios.java: chamada readAllBytes esperada não encontrada")
                  source = source.replace(old, new)

                  marker = "    private final GameboyType gameboyType;"
                  helper_lines = [
                      "    private static byte[] readFullyCompat(InputStream input) throws IOException {",
                      "        ByteArrayOutputStream buffer = new ByteArrayOutputStream();",
                      "        byte[] data = new byte[8192];",
                      "        int read;",
                      "        while ((read = input.read(data, 0, data.length)) != -1) {",
                      "            buffer.write(data, 0, read);",
                      "        }",
                      "        return buffer.toByteArray();",
                      "    }",
                      "",
                  ]
                  helper = "\n".join(helper_lines)
                  if marker not in source:
                      raise SystemExit("Bios.java: marcador para helper não encontrado")
                  source = source.replace(marker, helper + marker)

              path.write_text(source)

          def patch_defined_palettes():
              path = Path("/tmp/coffee-gb/core/src/main/java/eu/rekawek/coffeegb/core/sgb/DefinedPalettes.java")
              source = path.read_text()
              old = "var bytes = is.readAllBytes();"
              new = (
                  "var out = new java.io.ByteArrayOutputStream(); "
                  "byte[] buffer = new byte[4096]; "
                  "int read; "
                  "while ((read = is.read(buffer)) != -1) { out.write(buffer, 0, read); } "
                  "var bytes = out.toByteArray();"
              )
              if old in source:
                  source = source.replace(old, new)
              elif "readAllBytes()" in source:
                  raise SystemExit("DefinedPalettes.java: readAllBytes em formato inesperado")
              path.write_text(source)

          patch_bios()
          patch_defined_palettes()

          offenders = []
          for path in Path("/tmp/coffee-gb/core/src/main/java").rglob("*.java"):
              if "readAllBytes()" in path.read_text():
                  offenders.append(str(path))
          if offenders:
              print("Ainda existem chamadas readAllBytes incompatíveis:")
              for item in offenders:
                  print(item)
              raise SystemExit(1)

          print("Coffee GB Android runtime compatibility patch aplicado.")
          PY_COFFEE_ANDROID_COMPAT

          rm -rf app/libs
          mkdir -p app/libs

          cd /tmp/coffee-gb
          mvn -q -f core/pom.xml -DskipTests -Dmaven.compiler.release=17 -Dmaven.compiler.source=17 -Dmaven.compiler.target=17 package

          cp core/target/core-*.jar "$GITHUB_WORKSPACE/app/libs/coffee-gb-core.jar"

          if unzip -p "$GITHUB_WORKSPACE/app/libs/coffee-gb-core.jar" eu/rekawek/coffeegb/core/memory/Bios.class 2>/dev/null | strings | grep -q readAllBytes; then
            echo "coffee-gb-core.jar ainda contém readAllBytes em Bios.class. Abortando."
            exit 1
          fi

          if unzip -p "$GITHUB_WORKSPACE/app/libs/coffee-gb-core.jar" eu/rekawek/coffeegb/core/sgb/DefinedPalettes.class 2>/dev/null | strings | grep -q readAllBytes; then
            echo "coffee-gb-core.jar ainda contém readAllBytes em DefinedPalettes.class. Abortando."
            exit 1
          fi

          mvn -q dependency:copy -Dartifact=org.slf4j:slf4j-api:2.0.12 -DoutputDirectory="$GITHUB_WORKSPACE/app/libs" -Dtransitive=false
          mvn -q dependency:copy -Dartifact=org.jetbrains:annotations:24.1.0 -DoutputDirectory="$GITHUB_WORKSPACE/app/libs" -Dtransitive=false
          mvn -q dependency:copy -Dartifact=com.google.guava:guava:33.2.1-android -DoutputDirectory="$GITHUB_WORKSPACE/app/libs" -Dtransitive=false

          cd "$GITHUB_WORKSPACE"
          echo "JARs finais do APK:"
          ls -lh app/libs
          test ! -f app/libs/jline-*.jar
          test ! -f app/libs/kotlin-*.jar

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2


      - name: Prepare SameBoy native cores
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl unzip file

          fetch_core() {
            local abi="$1"
            local url="https://buildbot.libretro.com/nightly/android/latest/${abi}/sameboy_libretro_android.so.zip"
            local zip="/tmp/sameboy-${abi}.zip"
            local out_dir="$GITHUB_WORKSPACE/app/src/main/jniLibs/${abi}"
            local target="${out_dir}/libsameboy_libretro_android.so"

            mkdir -p "$out_dir"
            rm -f "$zip" "$target"

            echo "Baixando SameBoy para ${abi}..."
            curl --fail --location \
              --retry 6 \
              --retry-delay 5 \
              --retry-all-errors \
              "$url" \
              --output "$zip"

            unzip -t "$zip"
            entry="$(unzip -Z1 "$zip" | grep -E 'sameboy_libretro_android\.so$' | head -n 1)"
            if [ -z "$entry" ]; then
              echo "Biblioteca SameBoy não encontrada dentro do ZIP."
              unzip -Z1 "$zip"
              exit 1
            fi

            unzip -p "$zip" "$entry" > "$target"
            test -s "$target"
            chmod 755 "$target"
            file "$target"
          }

          fetch_core "arm64-v8a"
          fetch_core "armeabi-v7a"

          find app/src/main/jniLibs \
            -type f \
            -name 'libsameboy_libretro_android.so' \
            -print \
            -exec ls -lh {} \;

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/CompanionDeck-v1.3-r2-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CompanionDeck-v1.3-r2-debug-apk
          path: dist/*.apk
