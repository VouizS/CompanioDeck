name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Coffee GB core
        run: |
          sudo apt-get update
          sudo apt-get install -y maven
          rm -rf /tmp/coffee-gb
          git clone --depth 1 https://github.com/trekawek/coffee-gb.git /tmp/coffee-gb

          rm -rf app/libs
          mkdir -p app/libs

          cd /tmp/coffee-gb
          mvn -q -f core/pom.xml -DskipTests -Dmaven.compiler.release=17 -Dmaven.compiler.source=17 -Dmaven.compiler.target=17 package

          cp core/target/core-*.jar $GITHUB_WORKSPACE/app/libs/coffee-gb-core.jar

          # Copiar somente dependências Android-safe necessárias pelo core.
          # Não usar dependency:copy-dependencies porque ela traz jline/guava/kotlin
          # do ecossistema desktop e quebra o D8 no Android.
          mvn -q dependency:copy -Dartifact=org.slf4j:slf4j-api:2.0.12 -DoutputDirectory=$GITHUB_WORKSPACE/app/libs -Dtransitive=false
          mvn -q dependency:copy -Dartifact=org.jetbrains:annotations:24.1.0 -DoutputDirectory=$GITHUB_WORKSPACE/app/libs -Dtransitive=false

          cd $GITHUB_WORKSPACE
          echo "JARs finais do APK:"
          ls -lh app/libs
          test ! -f app/libs/jline-*.jar
          test ! -f app/libs/guava-*.jar
          test ! -f app/libs/kotlin-*.jar

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/CompanionDeck-v1.1-r3-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CompanionDeck-v1.1-r3-debug-apk
          path: dist/*.apk
